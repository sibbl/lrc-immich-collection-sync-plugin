name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LuaJIT
        run: sudo apt-get update && sudo apt-get install -y luajit
      - name: Run tests
        run: ./test.sh
      - name: Build plugin bundle
        run: ./build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lrc-immich-collection-sync-plugin-lrplugin
          path: dist/lrc-immich-collection-sync-plugin.lrplugin/
